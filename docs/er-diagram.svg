<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <style>
      .header   { fill: #0B2545; }
      .header-t { fill: #FFFFFF; font-weight: 700; font-size: 18px; letter-spacing: 0.5px; }
      .card     { fill: #FFFFFF; stroke: #0B2545; stroke-width: 1.5; }
      .row      { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .col      { fill: #111827; font-size: 14px; }
      .typ      { fill: #0F766E; font-size: 13px; }
      .meta     { fill: #6B7280; font-size: 12px; font-style: italic; }
      .pk-badge { fill: #F59E0B; }
      .fk-badge { fill: #6366F1; }
      .uq-badge { fill: #0F766E; }
      .rel      { stroke: #0B2545; stroke-width: 1.5; fill: none; }
      .rel-lbl  { fill: #0B2545; font-size: 12px; }
      .title    { fill: #0B2545; font-size: 22px; font-weight: 700; }
      .subtitle { fill: #6B7280; font-size: 13px; }
      .footer   { fill: #6B7280; font-size: 12px; }
    </style>
    <marker id="dot" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6">
      <circle cx="5" cy="5" r="4" fill="#0B2545"/>
    </marker>
    <marker id="crow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M0,1 L11,6 L0,11 M6,6 L11,6" fill="none" stroke="#0B2545" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="40" y="40"  class="title">Movie Database  ER Diagram</text>
  <text x="40" y="62"  class="subtitle">PostgreSQL 16 " Normalized catalog with audit columns and full-text search</text>

  <!-- ============================ films (LEFT) ============================ -->
  <g transform="translate(40,100)">
    <rect class="card" x="0" y="0" width="430" height="380" rx="8"/>
    <rect class="header" x="0" y="0" width="430" height="42" rx="8"/>
    <rect class="header" x="0" y="20" width="430" height="22"/>
    <text class="header-t" x="20" y="28">films</text>

    <!-- rows -->
    <g transform="translate(0,42)">
      <!-- id -->
      <rect class="row" x="0" y="0"   width="430" height="36"/>
      <circle class="pk-badge" cx="20" cy="18" r="6"/>
      <text class="col" x="40"  y="22">id</text>
      <text class="typ" x="220" y="22">SERIAL</text>
      <text class="meta" x="320" y="22">PRIMARY KEY</text>

      <!-- name -->
      <rect class="row" x="0" y="36"  width="430" height="36"/>
      <circle class="uq-badge" cx="20" cy="54" r="6"/>
      <text class="col" x="40"  y="58">name</text>
      <text class="typ" x="220" y="58">TEXT</text>
      <text class="meta" x="320" y="58">UNIQUE, NOT NULL</text>

      <!-- release_year -->
      <rect class="row" x="0" y="72"  width="430" height="36"/>
      <text class="col" x="40"  y="94">release_year</text>
      <text class="typ" x="220" y="94">INTEGER</text>
      <text class="meta" x="320" y="94">CHECK 1888..2100</text>

      <!-- runtime -->
      <rect class="row" x="0" y="108" width="430" height="36"/>
      <text class="col" x="40"  y="130">runtime</text>
      <text class="typ" x="220" y="130">INTEGER</text>
      <text class="meta" x="320" y="130">CHECK &gt; 0</text>

      <!-- rating -->
      <rect class="row" x="0" y="144" width="430" height="36"/>
      <text class="col" x="40"  y="166">rating</text>
      <text class="typ" x="220" y="166">film_rating</text>
      <text class="meta" x="320" y="166">ENUM</text>

      <!-- box_office -->
      <rect class="row" x="0" y="180" width="430" height="36"/>
      <text class="col" x="40"  y="202">box_office</text>
      <text class="typ" x="220" y="202">BIGINT</text>
      <text class="meta" x="320" y="202">CHECK &gt;= 0</text>

      <!-- created_at -->
      <rect class="row" x="0" y="216" width="430" height="36"/>
      <text class="col" x="40"  y="238">created_at</text>
      <text class="typ" x="220" y="238">TIMESTAMPTZ</text>
      <text class="meta" x="320" y="238">DEFAULT now()</text>

      <!-- updated_at -->
      <rect class="row" x="0" y="252" width="430" height="36"/>
      <text class="col" x="40"  y="274">updated_at</text>
      <text class="typ" x="220" y="274">TIMESTAMPTZ</text>
      <text class="meta" x="320" y="274">trigger</text>

      <!-- search_vector -->
      <rect class="row" x="0" y="288" width="430" height="36"/>
      <text class="col" x="40"  y="310">search_vector</text>
      <text class="typ" x="220" y="310">TSVECTOR</text>
      <text class="meta" x="320" y="310">GIN index</text>
    </g>
  </g>

  <!-- ============================ film_genres (CENTER) ==================== -->
  <g transform="translate(530,180)">
    <rect class="card" x="0" y="0" width="220" height="142" rx="8"/>
    <rect class="header" x="0" y="0" width="220" height="42" rx="8"/>
    <rect class="header" x="0" y="20" width="220" height="22"/>
    <text class="header-t" x="20" y="28">film_genres</text>

    <g transform="translate(0,42)">
      <rect class="row" x="0" y="0"  width="220" height="36"/>
      <circle class="fk-badge" cx="20" cy="18" r="6"/>
      <text class="col" x="40" y="22">film_id</text>
      <text class="typ" x="135" y="22">INTEGER</text>

      <rect class="row" x="0" y="36" width="220" height="36"/>
      <circle class="fk-badge" cx="20" cy="54" r="6"/>
      <text class="col" x="40" y="58">genre_id</text>
      <text class="typ" x="135" y="58">INTEGER</text>

      <rect class="row" x="0" y="72" width="220" height="28"/>
      <text class="meta" x="20" y="91">PRIMARY KEY (film_id, genre_id)</text>
    </g>
  </g>

  <!-- ============================ genres (RIGHT) ========================== -->
  <g transform="translate(820,200)">
    <rect class="card" x="0" y="0" width="320" height="142" rx="8"/>
    <rect class="header" x="0" y="0" width="320" height="42" rx="8"/>
    <rect class="header" x="0" y="20" width="320" height="22"/>
    <text class="header-t" x="20" y="28">genres</text>

    <g transform="translate(0,42)">
      <rect class="row" x="0" y="0"  width="320" height="36"/>
      <circle class="pk-badge" cx="20" cy="18" r="6"/>
      <text class="col" x="40"  y="22">id</text>
      <text class="typ" x="180" y="22">SERIAL</text>
      <text class="meta" x="245" y="22">PK</text>

      <rect class="row" x="0" y="36" width="320" height="36"/>
      <circle class="uq-badge" cx="20" cy="54" r="6"/>
      <text class="col" x="40"  y="58">name</text>
      <text class="typ" x="180" y="58">TEXT</text>
      <text class="meta" x="245" y="58">UNIQUE</text>

      <rect class="row" x="0" y="72" width="320" height="36"/>
      <text class="col" x="40"  y="94">description</text>
      <text class="typ" x="180" y="94">TEXT</text>
      <text class="meta" x="245" y="94">nullable</text>
    </g>
  </g>

  <!-- ============================ schema_migrations (BOTTOM) ============== -->
  <g transform="translate(530,420)">
    <rect class="card" x="0" y="0" width="430" height="160" rx="8"/>
    <rect class="header" x="0" y="0" width="430" height="42" rx="8"/>
    <rect class="header" x="0" y="20" width="430" height="22"/>
    <text class="header-t" x="20" y="28">schema_migrations</text>

    <g transform="translate(0,42)">
      <rect class="row" x="0" y="0"  width="430" height="36"/>
      <circle class="pk-badge" cx="20" cy="18" r="6"/>
      <text class="col" x="40"  y="22">version</text>
      <text class="typ" x="220" y="22">TEXT</text>
      <text class="meta" x="320" y="22">PRIMARY KEY</text>

      <rect class="row" x="0" y="36" width="430" height="36"/>
      <text class="col" x="40"  y="58">applied_at</text>
      <text class="typ" x="220" y="58">TIMESTAMPTZ</text>
      <text class="meta" x="320" y="58">DEFAULT now()</text>

      <rect class="row" x="0" y="72" width="430" height="36"/>
      <text class="col" x="40"  y="94">description</text>
      <text class="typ" x="220" y="94">TEXT</text>
      <text class="meta" x="320" y="94">nullable</text>
    </g>
  </g>

  <!-- ============================ Relationships =========================== -->
  <!-- films.id  <- film_genres.film_id  (one-to-many) -->
  <line class="rel" x1="470" y1="240" x2="530" y2="240" marker-start="url(#dot)" marker-end="url(#crow)"/>
  <text class="rel-lbl" x="475" y="232">1..N</text>

  <!-- genres.id <- film_genres.genre_id (one-to-many) -->
  <line class="rel" x1="820" y1="260" x2="750" y2="260" marker-start="url(#dot)" marker-end="url(#crow)"/>
  <text class="rel-lbl" x="760" y="252">N..1</text>

  <!-- Legend -->
  <g transform="translate(40,520)">
    <text class="title" font-size="14">Legend</text>
    <circle class="pk-badge" cx="10" cy="22" r="6"/>
    <text class="meta" x="25" y="26">PRIMARY KEY</text>

    <circle class="uq-badge" cx="130" cy="22" r="6"/>
    <text class="meta" x="145" y="26">UNIQUE</text>

    <circle class="fk-badge" cx="220" cy="22" r="6"/>
    <text class="meta" x="235" y="26">FOREIGN KEY</text>

    <text class="meta" x="0" y="56">Italic notes mark CHECK constraints, defaults, and index hints.</text>
  </g>

  <!-- Footer -->
  <text class="footer" x="40" y="700">Generated for the Movie Database PostgreSQL Blueprint " see docs/PERFORMANCE.md for query plans.</text>
</svg>
