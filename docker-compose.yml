# =============================================================================
#  docker-compose.yml
#  -----------------------------------------------------------------------------
#  Spins up a self-contained PostgreSQL instance pre-loaded with the project
#  schema and seed data, plus an Adminer sidecar for browser-based inspection.
#
#  On first boot, the official `postgres` image executes every `*.sql` file
#  mounted into `/docker-entrypoint-initdb.d/` in lexical order, so the
#  database is fully provisioned without any manual `psql` step.
#
#  QUICK START:
#      cp .env.example .env       # then fill in values
#      docker compose up -d       # start postgres + adminer in the background
#      docker compose logs -f db  # follow logs (Ctrl+C to detach)
#      open http://localhost:8080 # adminer UI
#      docker compose down        # stop and remove the containers
#      docker compose down -v     # stop AND drop the persisted volume
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: films_postgres
    restart: unless-stopped
    env_file: [.env]
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # Persisted data lives in a named Docker volume (NOT in the repo).
      - films_pgdata:/var/lib/postgresql/data
      # Init scripts run alphabetically on first container start only.
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4-standalone
    container_name: films_adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha
    ports:
      - "8080:8080"

volumes:
  films_pgdata:
    name: films_pgdata
